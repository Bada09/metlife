                { icon: "percent", label: "Conversion", desc: "Taux de finalisation par étape de l'entonnoir" },
                { icon: "hourglass-half", label: "Cycle de vente", desc: "Délai moyen entre premier contact et signature" },
                { icon: "comment-dots", label: "Surmontement des objections", desc: "Efficacité dans le traitement des résistances" },
                { icon: "chart-line", label: "Performance standardisée", desc: "Réduction de la variabilité entre conseillers" },
                { icon: "brain", label: "Courbe d'apprentissage", desc: "Temps pour que les nouveaux conseillers atteignent la performance moyenne" },
                { icon: "database", label: "Intelligence de gestion", desc: "Identification des goulots par étape" }
            ],
            kpisFooter: "Suivi qualitatif et amélioration continue — pas d'objectifs fixes, focus sur l'amélioration durable.",
            pilotoTitle: "Plan de déploiement (pilote réel)",
            timelineSteps: [
                { label: "Semaine 1", title: "Onboarding + Formation IA", desc: "Les conseillers accèdent au simulateur avec 4 personae et certification." },
                { label: "Semaine 2–3", title: "Terrain + Collecte de données", desc: "Scripts rhapsody actifs, l'IA enregistre objections et conversions." },
                { label: "Semaine 4", title: "Analyse + Ajustements", desc: "Tableau de bord exécutif et recalibrage du playbook." }
            ],
            highlightText: "« Nous ne formons pas seulement mieux le conseiller. Nous transformons la conversation en un système évolutif. »",
            highlightSub: "— Stratégie rhapsody x MetLife",
            footerNote: "Prochaines étapes : autorisation pour pilote avec groupe de conseillers · Déploiement progressif · Suivi de l'évolution continue.",
            pdfButton: "Exporter la présentation en PDF"
        }
    };

    let currentLang = 'pt';

    function renderLanguage(lang) {
        const t = translations[lang];
        if (!t) return;
        currentLang = lang;
        
        // Atualizar textos dos botões de idioma (ativo)
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.getAttribute('data-lang') === lang) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        
        // Atualizar menu links
        document.querySelectorAll('.nav-links-mobile a').forEach(link => {
            const key = link.getAttribute('data-nav-key');
            if (key && t.nav[key]) {
                const span = link.querySelector('span');
                if (span) span.innerText = t.nav[key];
            }
        });
        
        // Botão PDF
        const pdfSpan = document.getElementById('pdfBtnText');
        if (pdfSpan) pdfSpan.innerText = t.pdfButton;
        
        // Gerar HTML dinâmico completo
        const container = document.getElementById('dynamic-content');
        if (!container) return;
        
        // Hero
        const heroHtml = `
            <div class="hero">
                <span class="pill"><i class="fas fa-chart-line"></i> ${t.heroBadge}</span>
                <h1>${t.heroTitle}</h1>
                <p style="font-size: 1.1rem; color: #2c5a7a; max-width: 700px; margin: 16px auto;">${t.heroSub}</p>
                <div style="margin: 28px auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;">
                    ${t.heroFeatures.map(f => `<div><i class="fas fa-chart-simple"></i> ${f}</div>`).join('')}
                </div>
            </div>
        `;
        
        // Problemas estruturais
        const problemasHtml = `
            <section id="problemas-estruturais">
                <div class="section-header">
                    <h2><i class="fas fa-chart-line"></i> ${t.probTitle}</h2>
                    <span class="badge-section">${t.probBadge}</span>
                </div>
                <div class="conservative-list">
                    ${t.probItems.map(item => `
                        <div class="pain-item">
                            <div class="pain-title"><i class="fas fa-globe"></i> ${item.title}</div>
                            <div class="pain-desc">${item.desc}</div>
                            <div class="pain-translation"><i class="fas fa-comment-dots"></i> ${item.trans}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="quote"><i class="fas fa-lightbulb"></i> ${t.probQuote}</div>
            </section>
        `;
        
        // Desafios
        const desafiosHtml = `
            <section id="desafios">
                <h2><i class="fas fa-exclamation-triangle"></i> ${t.desafiosTitle}</h2>
                <div class="grid-2col">
                    ${t.desafiosCards.map(card => `
                        <div class="problem-card"><div class="problem-icon"><i class="fas fa-${card.icon}"></i></div><h3>${card.title}</h3><p>${card.text}</p></div>
                    `).join('')}
                </div>
                <div class="quote"><i class="fas fa-chart-line"></i> ${t.desafiosQuote}</div>
            </section>
        `;
        
        // Solução
        const solucaoHtml = `
            <section id="solucao">
                <h2><i class="fas fa-microchip"></i> ${t.solucaoTitle}</h2>
                <div class="grid-2col">
                    ${t.solucaoCards.map(card => `<div class="solution-card"><i class="fas fa-handshake fa-2x" style="color:#ff914d;"></i><h3>${card.title}</h3><p>${card.text}</p></div>`).join('')}
                </div>
                <div style="background:#eef2ff; border-radius: 24px; padding: 20px;"><i class="fas fa-robot"></i> <strong>${t.solucaoExample}</strong></div>
            </section>
        `;
        
        // Benefícios
        const beneficiosHtml = `
            <section id="beneficios">
                <h2><i class="fas fa-gift"></i> ${t.beneficiosTitle}</h2>
                <div class="grid-2col">
                    <div><ul class="benefit-list">${t.beneficiosList1.map(b => `<li><i class="fas fa-check-circle"></i> ${b}</li>`).join('')}</ul></div>
                    <div><ul class="benefit-list">${t.beneficiosList2.map(b => `<li><i class="fas fa-check-circle"></i> ${b}</li>`).join('')}</ul></div>
                </div>
                <div class="quote"><i class="fas fa-chart-line"></i> ${t.beneficiosQuote}</div>
            </section>
        `;
        
        // KPIs
        const kpisHtml = `
            <section id="kpis">
                <h2><i class="fas fa-chart-line"></i> ${t.kpisTitle}</h2>
                <div class="flex-stats">
                    ${t.kpisBoxes.map(k => `<div class="stat-box"><i class="fas fa-${k.icon} fa-2x" style="color:#ff914d;"></i><div class="stat-number">${k.label}</div><p>${k.desc}</p></div>`).join('')}
                </div>
                <div class="conceptual-kpi"><i class="fas fa-chart-simple"></i> ${t.kpisFooter}</div>
            </section>
        `;
        
        // Piloto
        const pilotoHtml = `
            <section id="piloto">
                <h2><i class="fas fa-calendar-week"></i> ${t.pilotoTitle}</h2>
                <div class="timeline-mobile">
                    ${t.timelineSteps.map(step => `<div class="timeline-step"><span class="pill">${step.label}</span><h4>${step.title}</h4><p>${step.desc}</p></div>`).join('')}
                </div>
                <div class="highlight-gradient">
                    <i class="fas fa-quote-left fa-2x"></i>
                    <p>${t.highlightText}</p>
                    <p style="margin-top: 12px;">${t.highlightSub}</p>
                </div>
                <div class="footer-note">
                    <i class="fas fa-check-circle"></i> ${t.footerNote}
                </div>
            </section>
        `;
        
        container.innerHTML = heroHtml + problemasHtml + desafiosHtml + solucaoHtml + beneficiosHtml + kpisHtml + pilotoHtml;
    }
    
    // Inicializar e adicionar listeners
    document.addEventListener('DOMContentLoaded', () => {
        renderLanguage('pt');
        // listeners para botões de idioma
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const lang = btn.getAttribute('data-lang');
                if (lang) renderLanguage(lang);
            });
        });
        
        // Menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        if (menuToggle && navLinks) {
            menuToggle.addEventListener('click', () => navLinks.classList.toggle('open'));
            document.querySelectorAll('.nav-links-mobile a').forEach(link => {
                link.addEventListener('click', () => navLinks.classList.remove('open'));
            });
        }
        
        // PDF Print
        const printBtn = document.getElementById('savePdfBtnDynamic');
        if (printBtn) {
            printBtn.addEventListener('click', () => window.print());
        }
    });
    
    // Estilo de impressão
    const stylePrint = document.createElement('style');
    stylePrint.innerHTML = `@media print { .mobile-nav, .menu-toggle, .lang-switch-buttons, .btn-pdf, .no-print { display: none; } section { break-inside: avoid; page-break-inside: avoid; } .highlight-gradient { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }`;
    document.head.appendChild(stylePrint);
</script>
</body>
</html>
